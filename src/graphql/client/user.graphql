query GetUserById($id: Int!) {
  user(id: $id) {
    id
    name
    email
    createdAt
    gravatar
  }
}

query Me {
  me {
    id
    name
    email
    createdAt
    gravatar
  }
}

mutation Login($auth: Login!) {
  login(auth: $auth) {
    token
  }
}

mutation CreateUser($user: CreateUser!) {
  createUser(user: $user) {
    id
  }
}

mutation UpdateMe($user: UpdateUser!) {
  updateMe(user: $user) {
    id
    name
    email
    gravatar
  }
}
