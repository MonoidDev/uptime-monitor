
query GetTraceById($id: Int!) {
  trace(id: $id) {
    id
    traceType
    website {
      id
      name
      url
      pingInterval
    }
    duration
    status
    requestHeaders
    responseHeaders
    responseData
    createdAt
  }
}

mutation CreateTrace($trace: CreateTrace!) {
  createTrace(trace: $trace) {
    id
    traceType
    websiteId
    duration
    status
    requestHeaders
    responseHeaders
    responseData
  }
}
