
query GetTraceById($id: Int!) {
  trace(id: $id) {
    id
    traceType
    website {
      id
      name
      url
      pingInterval
    }
    duration
    status
    httpStatusCode
    requestHeaders
    responseHeaders
    responseData
    createdAt
  }
}

mutation CreateTrace($trace: CreateTrace!) {
  createTrace(trace: $trace) {
    id
    traceType
    websiteId
    duration
    status
    httpStatusCode
    requestHeaders
    responseHeaders
    responseData
  }
}

query TraceOfErrorCount($rangeTime: String!, $websiteId: Int) {
  traceOfErrorCount(rangeTime: $rangeTime, websiteId: $websiteId) {
    time
    groupId
    count
  }
}

query TraceOfResponseTime($rangeTime: String!, $websiteId: Int) {
  traceOfResponseTime(rangeTime: $rangeTime, websiteId: $websiteId) {
    time
    groupId
    avgDuration
  }
}

query Traces($query: TraceQuery!) {
  traces(query: $query) {
    minId
    maxId
    results {
      id
      traceType
      websiteId
      duration
      status
      httpStatusCode
      requestHeaders
      responseHeaders
      responseData
      createdAt
      website {
        id
        name
        url
      }
    }
  }
}