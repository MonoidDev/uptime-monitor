
query GetTraceById($id: Int!) {
  trace(id: $id) {
    id
    traceType
    websiteId
    duration
    status
    requestHeaders
    responseHeaders
    responseData
  }
}

mutation CreateTrace($trace: CreateTrace!) {
  createTrace(trace: $trace) {
    id
    traceType
    websiteId
    duration
    status
    requestHeaders
    responseHeaders
    responseData
  }
}
