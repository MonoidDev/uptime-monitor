query GetWebsiteById($id: Int!) {
  website(id: $id) {
    id
    name
    url
    pingInterval
    userId
  }
}

query GetWebsites($websitesPage: Int!) {
  websites(page: $websitesPage) {
    count
    results {
      id
      name
      url
      pingInterval
      enabled
      userId
    }
  }
}

mutation CreateWebsite($website: CreateUpdateWebsite!) {
  createWebsite(website: $website) {
    id
    name
    url
    pingInterval
    userId
  }
}
