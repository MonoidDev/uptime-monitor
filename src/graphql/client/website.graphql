
fragment WebsiteFrag on Website {
  id
  name
  url
  pingInterval
  enabled
  userId
  emails
  status
  errorPredicate
  sslMessage {
    severity
    message
  }
}

query GetWebsiteById($id: Int!) {
  website(id: $id) {
    ...WebsiteFrag
  }
}

query GetFirstWebsite {
  firstWebsite {
    createdAt
  }
}

query GetWebsites($page: Int!, $pageSize: Int!, $sortByName: String, $keyword: String) {
  websites(page: $page, pageSize: $pageSize, sortByName: $sortByName, keyword: $keyword) {
    count
    results {
      ...WebsiteFrag
    }
  }
}

query GetUserWebsites {
  userWebsites {
    name
    id
  }
}

mutation CreateWebsite($website: CreateUpdateWebsite!) {
  createWebsite(website: $website) {
    id
    name
    url
    pingInterval
    enabled
    userId
    emails
  }
}

mutation UpdateWebsite($websiteId: Int!, $website: CreateUpdateWebsite!) {
  updateWebsite(websiteId: $websiteId, website: $website) {
    id
    name
    url
    pingInterval
    enabled
    userId
    emails
  }
}

mutation DeleteWebsite($websiteId: Int!) {
  deleteWebsite(websiteId: $websiteId) {
    id
    name
  }
}
