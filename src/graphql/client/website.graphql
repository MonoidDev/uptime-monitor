query GetWebsiteById($id: Int!) {
  website(id: $id) {
    id
    name
    url
    pingInterval
    enabled
    userId
    emails
  }
}

query GetFirstWebsite {
  firstWebsite {
    createdAt
  }
}

query GetWebsites($page: Int!, $keyword: String) {
  websites(page: $page, keyword: $keyword) {
    count
    results {
      id
      name
      url
      pingInterval
      enabled
      userId
    }
  }
}

mutation CreateWebsite($website: CreateUpdateWebsite!) {
  createWebsite(website: $website) {
    id
    name
    url
    pingInterval
    enabled
    userId
    emails
  }
}

mutation UpdateWebsite($websiteId: Int!, $website: CreateUpdateWebsite!) {
  updateWebsite(websiteId: $websiteId, website: $website) {
    id
    name
    url
    pingInterval
    enabled
    userId
    emails
  }
}

mutation DeleteWebsite($websiteId: Int!) {
  deleteWebsite(websiteId: $websiteId) {
    id
    name
  }
}
